<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>装修风格库</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #16181f;
      --panel-soft: #1c1f28;
      --text: #f3f5fa;
      --muted: #8a93a6;
      --line: rgba(255,255,255,0.08);
      --accent: #f59e0b;
      --shadow: 0 12px 24px rgba(0,0,0,0.45);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,17,21,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .header-inner { max-width: 1480px; margin: 0 auto; padding: 12px 20px 0; }
    .brand {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .brand h1 { margin: 0; font-size: 18px; }
    .brand .subtitle { color: var(--muted); font-size: 13px; }
    .header-actions { display: flex; gap: 8px; }
    .btn {
      background: var(--panel-soft); color: var(--text);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 6px 14px; font-size: 13px; cursor: pointer;
    }
    .btn:hover { background: #252834; }
    .btn-accent { background: var(--accent); color: #0f1115; font-weight: 600; border-color: var(--accent); }
    .btn-accent:hover { background: #fbbf24; }
    .nav { display: flex; gap: 14px; color: var(--muted); font-size: 13px; margin: 4px 0 6px; }
    .nav a { color: var(--muted); text-decoration: none; }
    .nav a:hover { color: var(--text); }

    .filters {
      max-width: 1480px; margin: 0 auto; padding: 0 20px 12px;
    }
    .tab-row, .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .tab {
      padding: 7px 16px; border-radius: 999px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--line); cursor: pointer; font-size: 13px;
    }
    .tab.active { background: var(--text); color: #0f1115; border-color: var(--text); font-weight: 600; }
    .chip {
      padding: 4px 10px; border-radius: 6px;
      background: var(--panel-soft); color: var(--muted);
      border: 1px solid var(--line); cursor: pointer; font-size: 12px;
    }
    .chip.active { background: var(--accent); color: #0f1115; border-color: var(--accent); }

    main { max-width: 1480px; margin: 0 auto; padding: 18px 20px 64px; }
    .stats { color: var(--muted); font-size: 13px; margin-bottom: 14px; }

    .grid { column-count: 4; column-gap: 14px; }
    @media (max-width: 1200px) { .grid { column-count: 3; } }
    @media (max-width: 800px)  { .grid { column-count: 2; } }
    @media (max-width: 480px)  { .grid { column-count: 1; } }

    .card {
      break-inside: avoid; margin-bottom: 14px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--panel); box-shadow: var(--shadow);
      position: relative; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .card:hover { transform: translateY(-2px); }
    .card img { width: 100%; display: block; }
    .like-btn {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      border: none; color: white; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .like-btn.liked { color: var(--accent); background: rgba(245,158,11,0.18); }
    .ts-pill {
      position: absolute; top: 8px; left: 8px;
      padding: 2px 7px; border-radius: 5px; font-size: 10.5px;
      background: rgba(0,0,0,0.55); color: white; backdrop-filter: blur(6px);
      font-family: monospace;
    }
    .card .body { padding: 9px 12px 12px; }
    .card .caption { font-size: 13px; line-height: 1.5; color: var(--text); }
    .card .pts {
      margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line);
      font-size: 11.5px; color: var(--muted); line-height: 1.5;
    }
    .card .pts li { margin-left: -10px; padding: 1px 0; }
    .card .meta {
      margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap;
      font-size: 10.5px; color: var(--muted);
    }
    .tag-pill { padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); }
    .from-link {
      display: block; margin-top: 6px; font-size: 11px;
      color: var(--accent); text-decoration: none;
    }
    .from-link:hover { text-decoration: underline; }

    .placeholder { text-align: center; padding: 40px 20px; color: var(--muted); }

    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(440px, 92vw); background: var(--panel); z-index: 101;
      box-shadow: -12px 0 32px rgba(0,0,0,0.5);
      transform: translateX(100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      padding: 16px 18px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .drawer-head h2 { margin: 0; font-size: 16px; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 16px; }
    .fav-row {
      display: flex; gap: 12px; margin-bottom: 14px;
      padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .fav-row img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; }
    .fav-row .info { flex: 1; min-width: 0; font-size: 12.5px; }
    .fav-row .meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .fav-row button.rm {
      background: transparent; color: var(--muted); border: none; cursor: pointer; font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div>
          <h1>🎨 装修风格库</h1>
          <div class="subtitle">从你看过的风格视频里抽出的真实设计帧 + AI 配文</div>
        </div>
        <div class="header-actions">
          <button class="btn" id="export-favs">导出收藏</button>
          <button class="btn btn-accent" id="open-drawer">收藏夹 <span id="fav-count">0</span></button>
        </div>
      </div>
      <div class="nav">
        <a href="index.html">← 主页</a>
        <a href="javascript:void(0)" id="clear-focus" style="display:none">清除"仅看 <span id="focus-name"></span>"</a>
      </div>
    </div>
    <div class="filters">
      <div class="tab-row" id="tab-row"></div>
      <div class="chip-row" id="chip-row"></div>
    </div>
  </header>

  <main>
    <div class="stats" id="stats">加载中…</div>
    <div class="grid" id="grid"></div>
    <div class="placeholder" id="empty" hidden>风格库还是空的。先在 inbox 里丢一个"风格类"视频跑通管线。</div>
  </main>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <h2>我的收藏 (<span id="drawer-count">0</span>)</h2>
      <button class="btn" id="close-drawer">关闭</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <script>
    const FAV_KEY = "style_library_favs_v1";
    const SPACES = ["全部", "儿童房", "客厅", "厨房", "餐厅", "餐边柜", "主卧", "卫生间", "阳台", "玄关", "衣帽间"];
    const STYLES = ["原木", "现代简约", "温暖简约", "奶油风", "简约", "侘寂", "法式", "北欧"];

    const params = new URLSearchParams(location.search);
    const focusVideoId = params.get("focus") || "";

    const state = {
      frames: [],
      activeSpace: "全部",
      activeStyles: new Set(),
      favs: loadFavs(),
    };

    function loadFavs() {
      try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch { return []; }
    }
    function saveFavs() {
      localStorage.setItem(FAV_KEY, JSON.stringify(state.favs));
      document.getElementById("fav-count").textContent = state.favs.length;
      document.getElementById("drawer-count").textContent = state.favs.length;
    }

    function fmtTs(s) {
      s = Math.round(s || 0);
      const m = Math.floor(s / 60), ss = s % 60;
      return `${m}:${String(ss).padStart(2,"0")}`;
    }

    function frameKey(fr) {
      return `${fr.video_id}::${fr.ts}`;
    }
    function isFav(fr) {
      return state.favs.some(f => f.key === frameKey(fr));
    }
    function toggleFav(fr) {
      const key = frameKey(fr);
      const exist = state.favs.find(f => f.key === key);
      if (exist) {
        state.favs = state.favs.filter(f => f.key !== key);
      } else {
        state.favs.unshift({
          key,
          video_id: fr.video_id,
          video_title: fr.video_title,
          ts: fr.ts,
          frame_path: fr.frame_path,
          caption: fr.caption,
          favored_at: new Date().toISOString(),
        });
      }
      saveFavs();
    }

    function cardMatches(fr) {
      if (focusVideoId && fr.video_id !== focusVideoId) return false;
      if (state.activeSpace !== "全部") {
        const sp = (fr.tags && fr.tags.space) || fr.overall_space || [];
        if (!sp.includes(state.activeSpace)) return false;
      }
      if (state.activeStyles.size > 0) {
        const st = (fr.tags && fr.tags.style) || fr.overall_style || [];
        if (!st.some(s => state.activeStyles.has(s))) return false;
      }
      return true;
    }

    function renderTabs() {
      const r = document.getElementById("tab-row"); r.innerHTML = "";
      SPACES.forEach(s => {
        const el = document.createElement("button");
        el.className = "tab" + (s === state.activeSpace ? " active" : "");
        el.textContent = s;
        el.onclick = () => { state.activeSpace = s; renderTabs(); renderGrid(); };
        r.appendChild(el);
      });
    }
    function renderChips() {
      const r = document.getElementById("chip-row"); r.innerHTML = "";
      STYLES.forEach(s => {
        const el = document.createElement("button");
        el.className = "chip" + (state.activeStyles.has(s) ? " active" : "");
        el.textContent = s;
        el.onclick = () => {
          if (state.activeStyles.has(s)) state.activeStyles.delete(s);
          else state.activeStyles.add(s);
          renderChips(); renderGrid();
        };
        r.appendChild(el);
      });
      if (state.activeStyles.size > 0) {
        const c = document.createElement("button");
        c.className = "chip"; c.textContent = "清空风格"; c.style.opacity = "0.7";
        c.onclick = () => { state.activeStyles.clear(); renderChips(); renderGrid(); };
        r.appendChild(c);
      }
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function renderGrid() {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      const stats = document.getElementById("stats");
      const filtered = state.frames.filter(cardMatches);

      grid.innerHTML = "";
      if (filtered.length === 0) {
        empty.hidden = false;
        stats.textContent = "0 张";
        return;
      }
      empty.hidden = true;

      const parts = [`${filtered.length} 张设计帧`];
      if (focusVideoId) parts.push(`仅看视频 ${focusVideoId}`);
      if (state.activeSpace !== "全部") parts.push(`空间: ${state.activeSpace}`);
      if (state.activeStyles.size > 0) parts.push(`风格: ${[...state.activeStyles].join(" / ")}`);
      stats.textContent = parts.join(" · ");

      const frag = document.createDocumentFragment();
      for (const fr of filtered) frag.appendChild(makeCard(fr));
      grid.appendChild(frag);
    }

    function makeCard(fr) {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = `../${fr.frame_path}`;
      img.alt = fr.caption || "";
      img.onerror = () => img.style.display = "none";
      card.appendChild(img);

      const ts = document.createElement("div");
      ts.className = "ts-pill";
      ts.textContent = fmtTs(fr.ts);
      card.appendChild(ts);

      const like = document.createElement("button");
      like.className = "like-btn" + (isFav(fr) ? " liked" : "");
      like.innerHTML = isFav(fr) ? "♥" : "♡";
      like.onclick = (e) => {
        e.stopPropagation();
        toggleFav(fr);
        like.classList.toggle("liked");
        like.innerHTML = isFav(fr) ? "♥" : "♡";
        renderDrawer();
      };
      card.appendChild(like);

      const body = document.createElement("div");
      body.className = "body";
      const cap = document.createElement("div");
      cap.className = "caption";
      cap.textContent = fr.caption || "(无配文)";
      body.appendChild(cap);

      if (fr.design_points && fr.design_points.length) {
        const ul = document.createElement("ul");
        ul.className = "pts";
        for (const p of fr.design_points.slice(0, 3)) {
          const li = document.createElement("li");
          li.textContent = p;
          ul.appendChild(li);
        }
        body.appendChild(ul);
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      const tags = (fr.tags && fr.tags.style) || [];
      const spaces = (fr.tags && fr.tags.space) || [];
      for (const t of [...spaces.slice(0,1), ...tags.slice(0,2)]) {
        const p = document.createElement("span"); p.className = "tag-pill"; p.textContent = t;
        meta.appendChild(p);
      }
      body.appendChild(meta);

      const from = document.createElement("a");
      from.className = "from-link";
      from.href = `study.html?id=${encodeURIComponent(fr.video_id)}#t=${Math.floor(fr.ts)}`;
      from.textContent = `📺 来自《${fr.video_title}》${fmtTs(fr.ts)}`;
      body.appendChild(from);

      card.appendChild(body);
      return card;
    }

    function renderDrawer() {
      const body = document.getElementById("drawer-body");
      body.innerHTML = "";
      if (state.favs.length === 0) {
        body.innerHTML = '<div class="placeholder">还没收藏 · 点 ♡ 试试</div>';
        return;
      }
      for (const f of state.favs) {
        const row = document.createElement("div");
        row.className = "fav-row";
        const img = document.createElement("img");
        img.src = `../${f.frame_path}`;
        row.appendChild(img);
        const info = document.createElement("div"); info.className = "info";
        info.innerHTML = `<a href="study.html?id=${encodeURIComponent(f.video_id)}" style="color:var(--text);text-decoration:none">${escapeHtml(f.caption || "(无)")}</a><div class="meta">${escapeHtml(f.video_title)} · ${fmtTs(f.ts)}</div>`;
        row.appendChild(info);
        const rm = document.createElement("button");
        rm.className = "rm"; rm.textContent = "×";
        rm.onclick = () => {
          state.favs = state.favs.filter(x => x.key !== f.key);
          saveFavs(); renderDrawer(); renderGrid();
        };
        row.appendChild(rm);
        body.appendChild(row);
      }
    }

    function openDrawer(open) {
      document.getElementById("drawer").classList.toggle("open", open);
      document.getElementById("drawer-overlay").classList.toggle("open", open);
    }

    function exportFavs() {
      if (state.favs.length === 0) { alert("收藏夹是空的"); return; }
      const lines = state.favs.map(f => JSON.stringify(f)).join("\n");
      const blob = new Blob([lines], { type: "application/x-ndjson" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `style-favs-${new Date().toISOString().slice(0,10)}.jsonl`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    async function init() {
      try {
        const r = await fetch("../data/style_index.json", { cache: "no-store" });
        if (r.ok) {
          const j = await r.json();
          state.frames = j.frames || [];
        }
      } catch {}

      if (focusVideoId) {
        const found = state.frames.find(f => f.video_id === focusVideoId);
        if (found) {
          document.getElementById("clear-focus").style.display = "inline";
          document.getElementById("focus-name").textContent = found.video_title || focusVideoId;
        }
      }
      document.getElementById("clear-focus").onclick = () => {
        location.href = "style.html";
      };

      document.getElementById("fav-count").textContent = state.favs.length;
      document.getElementById("drawer-count").textContent = state.favs.length;
      document.getElementById("open-drawer").onclick = () => { renderDrawer(); openDrawer(true); };
      document.getElementById("close-drawer").onclick = () => openDrawer(false);
      document.getElementById("drawer-overlay").onclick = () => openDrawer(false);
      document.getElementById("export-favs").onclick = exportFavs;

      renderTabs(); renderChips(); renderGrid();
    }
    init();
  </script>
</body>
</html>
